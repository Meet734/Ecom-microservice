services:
  postgres:
    image: postgres:16-alpine
    container_name: ecomm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ecomm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ecomm_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ecomm_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: ecomm_auth_service
    ports:
      - "3001:3001"
    volumes:
      # Mount your Windows code into the container
      - ./services/auth-service:/usr/src/app
      # CRITICAL: Preserve Linux node_modules, don't let Windows node_modules overwrite it
      - /usr/src/app/node_modules
    environment:
      # Inside Docker, service names resolve to container IPs via Docker DNS
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-changeme}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - JWT_REFRESH_EXPIRY_MS=604800000
      - BCRYPT_ROUNDS=12
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ecomm_frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      # Mount frontend code for hot reload
      - ./frontend:/app
      # Don't overwrite node_modules
      - /app/node_modules
      # Don't overwrite .next build
      - /app/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      - api-gateway

    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecomm_rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  elasticsearch:
    image: elasticsearch:8.14.0
    container_name: ecomm_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false    # disable auth in dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # limit memory — important for dev machines
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s  # ES takes a while to start

  user-service:
    build: ./services/user-service
    container_name: ecomm_user_service
    ports:
      - "3002:3002"
    volumes:
      - ./services/user-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_user_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build: ./services/product-service
    container_name: ecomm_product_service
    ports:
      - "3003:3003"
      - "50051:50051"  # gRPC port
    volumes:
      - ./services/product-service:/usr/src/app
      - ./proto:/usr/src/app/proto
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3003
      - GRPC_PORT=50051
      - PROTO_PATH=/usr/src/app/proto/product.proto
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_product_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  inventory-service:
    build: ./services/inventory-service
    container_name: ecomm_inventory_service
    ports:
      - "3005:3005"
    volumes:
      - ./services/inventory-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_inventory_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build: ./services/order-service
    container_name: ecomm_order_service
    ports:
      - "3004:3004"
    volumes:
      - ./services/order-service:/usr/src/app
      - ./proto:/usr/src/app/proto
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_order_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
      - PRODUCT_GRPC_HOST=product-service
      - PRODUCT_GRPC_PORT=50051
      - PROTO_PATH=/usr/src/app/proto/product.proto
      - USER_SERVICE_URL=http://user-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3005
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: ecomm_notification_service
    volumes:
      - ./services/notification-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST:-smtp.mailtrap.io}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@ecommerce.dev}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-EcomStore}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./services/api-gateway
    container_name: ecomm_api_gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-changeme}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - PRODUCT_SERVICE_URL=http://product-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - INVENTORY_SERVICE_URL=http://inventory-service:3005
      - PAYMENT_SERVICE_URL=http://payment-service:3006
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    container_name: ecomm_payment_service
    ports:
      - "3006:3006"
    volumes:
      - ./services/payment-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ecomm_payment_db
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      - ORDER_SERVICE_URL=http://order-service:3004
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  esdata: